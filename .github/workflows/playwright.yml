name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Which tests to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - api
          - web
      browser:
        description: 'Browser for web tests (only used when scope is web or all)'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      tag:
        description: 'Tag filter (e.g. @login, @cart, @api, @users)'
        required: false
        default: ''
        type: string

jobs:
  # ─── API Tests ────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.test_scope == 'all' || inputs.test_scope == 'api' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium (required for global-setup)
        run: npx playwright install --with-deps chromium

      - name: Run API tests
        run: |
          GREP="${{ inputs.tag }}"
          if [ -n "$GREP" ]; then
            npx playwright test --project=api --grep "$GREP"
          else
            npx playwright test --project=api
          fi
        env:
          BROWSER: chromium
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Upload API test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-api
          path: reports/playwright-html/
          retention-days: 7

  # ─── Web Tests ────────────────────────────────────────────────────────────
  web-tests:
    name: Web Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.test_scope == 'all' || inputs.test_scope == 'web' }}

    strategy:
      fail-fast: false
      matrix:
        browser: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.browser)) || fromJson('["chromium", "firefox"]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Web tests
        run: |
          GREP="${{ inputs.tag }}"
          if [ -n "$GREP" ]; then
            npx playwright test --project="${{ matrix.browser }}" --grep "$GREP"
          else
            npx playwright test --project="${{ matrix.browser }}"
          fi
        env:
          BROWSER: ${{ matrix.browser }}
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TIMEOUT: 60000
          RETRIES: 1
          WORKERS: 4

      - name: Upload Web test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-web-${{ matrix.browser }}
          path: reports/playwright-html/
          retention-days: 7